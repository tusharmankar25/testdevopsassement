name: CI to ACR and GitOps CD

on:
  push:
    branches: [ "main" ]

env:
  # Using github.sha gives us a unique, immutable tag for every commit
  IMAGE_TAG: ${{ github.sha }}

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS recommended)
        uses: actions/setup-node@v4
        with:
          node-version: '23'   # use LTS if you don't need v23

      - name: Frontend Compilation (Syntax Check)
        run: |
          find . -name "*.js" -exec node --check {} +

  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source . --exit-code 1

  trivy_fs_scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (FS)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  build_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        run: |
          IMAGE_FQDN="${{ secrets.ACR_SERVER }}/nodejs-app"
          docker build -t $IMAGE_FQDN:${{ env.IMAGE_TAG }} .
          docker push $IMAGE_FQDN:${{ env.IMAGE_TAG }}

  trivy_image_scan:
    runs-on: ubuntu-latest
    needs:
      - build_docker_image_and_push
    steps:
      - name: Checkout (noop, keeps workspace consistent)
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Run Trivy image scan for nodejs image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: '${{ secrets.ACR_SERVER }}/nodejs-app:${{ env.IMAGE_TAG }}'
          format: table
          exit-code: '0'                 # set to '1' to fail on vulns
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  update_cd_repo:
    runs-on: ubuntu-latest
    needs: trivy_image_scan
    steps:
      - name: Checkout GitOps CD Repository
        uses: actions/checkout@v4
        with:
          repository: tusharmankar25/gitops-CD
          token: ${{ secrets.GITOPS_PAT }}
          path: k8s-cd
      - name: Update Kubernetes Manifest in GitOps Repo
        run: |
          cd k8s-cd
 
          # This sed command finds the 'image:' line and replaces it with the new tag
          # Make sure the path to deployment.yaml matches your GitOps repo structure
          sed -i "s|image: .*|image: ${{ secrets.ACR_SERVER }}/nodejs-app:${{ env.IMAGE_TAG }}|g" deployment.yaml
          
          git config user.name "GitHub Actions CI"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Automated Sync: Update image tag to ${{ env.IMAGE_TAG }}"
          git push
